apiVersion: v1
kind: Service
metadata:
  name: node-janitor-svc
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app: node-janitor # Make sure this matches your Deployment's labels
  ports:
    - protocol: TCP
      port: 80         # Internal Service port
      targetPort: 8080 # Port in your Go container
      nodePort: 30080  # Port on the Master/Home node IP
